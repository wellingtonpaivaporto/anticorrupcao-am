name: Coleta Semanal

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pandas
      - run: python coletor.py
      - uses: actions/upload-artifact@v4
        with:
          name: dados-coletados
          path: dados/
          retention-days: 30
